<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Programação Web</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1 class="logo">Meu Portfólio</h1>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="sobre.html">Sobre</a>
                <a href="servicos.html">Serviços</a>
                <a href="portfolio.html" class="active">Portfolio</a>
                <a href="contato.html">Contato</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero small">
            <h2>Fale comigo</h2>
            <p>Preencha o formulário abaixo (somente estrutura HTML — sem envio real).</p>
        </section>

        <section class="contact-card">
            <form class="contact-form" action="#" method="post">
                <label>Nome
                    <input type="text" name="nome" placeholder="Seu nome">
                </label>
                <label>Email
                    <input type="email" name="email" placeholder="seu@exemplo.com">
                </label>
                <label>Assunto
                    <input type="text" name="assunto" placeholder="Assunto">
                </label>
                <label>Mensagem
                    <textarea name="mensagem" rows="6" placeholder="Escreva sua mensagem..."></textarea>
                </label>
                <div class="form-actions">
                    <button type="submit" class="btn">Enviar</button>
                    <button type="reset" class="btn ghost">Limpar</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">&copy; 2026 — Meu Portfólio</div>
    </footer>
    
</body>
</html>
